rules:
  # ---------------------------------------------------------------------------
  # Bronze
  # ---------------------------------------------------------------------------
  action-setup:
    status: exempt
    comment: Integration does not register custom service actions.
  appropriate-polling: done
  brands: todo
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No custom service actions to document.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # ---------------------------------------------------------------------------
  # Silver
  # ---------------------------------------------------------------------------
  action-exceptions:
    status: exempt
    comment: No custom service actions registered.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: No authentication required (public Aviation Weather Center API).
  test-coverage: done

  # ---------------------------------------------------------------------------
  # Gold
  # ---------------------------------------------------------------------------
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: ICAO station identifiers cannot be network-discovered; user enters the code manually.
  discovery-update-info:
    status: exempt
    comment: No network discovery mechanism; stations identified by fixed ICAO code.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Integration exposes a data service (METAR observations), not physical devices; no supported devices list is applicable.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Each config entry is a single station device; no hub-managed child devices appear dynamically.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: todo
  exception-translations:
    status: exempt
    comment: No service actions and no user-visible HomeAssistantError instances; config flow errors use string keys.
  icon-translations: todo
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No user-actionable repair scenarios; all failures are transient network errors handled by entity unavailability.
  stale-devices:
    status: exempt
    comment: One device per config entry; removing the entry removes the device.
